# Nginx-конфиг для dev-cloude.modelizmclub.ru (Beget VPS 31.207.75.124)
# PHP-FPM + Laravel + проксирование WebSocket (Laravel Reverb).
# SSL выпускается certbot'ом (wildcard *.modelizmclub.ru, DNS A → 31.207.75.124).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dev-cloude.modelizmclub.ru;

    # Перенаправление на HTTPS (кроме ACME-проверки certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dev-cloude.modelizmclub.ru;

    root /var/www/modelizmclub/current/public;
    index index.php;

    charset utf-8;
    client_max_body_size 220M;  # запас под видео в постах (см. config/modelizm.php)

    # Сертификаты certbot (wildcard *.modelizmclub.ru)
    ssl_certificate     /etc/letsencrypt/live/modelizmclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modelizmclub.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket → Laravel Reverb (порт 8080 локально)
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/modelizm-access.log;
    error_log  /var/log/nginx/modelizm-error.log;
}
